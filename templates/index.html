<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthAI - AI Disease Prediction System</title>
    <meta name="description" content="HealthAI is an AI-powered disease prediction system that predicts possible diseases based on symptoms and provides prevention, risk factors, and red flag information.">

    <meta name="google-site-verification" content="dJGvr4y-sOYJFEF-fy1fuppsv3aUOWPb67vXzhVImLE" /> 

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#eef5ff;
        }

        header{
            background:#0d6efd;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            width:80%;
            max-width:900px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.15);
        }

        h2{
            color:#0d6efd;
        }

        #search{
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:14px;
        }

        .symptoms{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:10px;
        }

        label{
            padding:8px;
            border:1px solid #ddd;
            border-radius:5px;
            cursor:pointer;
            display:block;
        }

        input[type=checkbox]{
            margin-right:10px;
        }

        button{
            margin-top:25px;
            width:100%;
            padding:15px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0b5ed7;
        }

        footer{
            margin-top:25px;
            text-align:center;
            color:red;
            font-size:14px;
        }
    
    .theme-btn{
position:fixed;
top:20px;
right:20px;
padding:10px 18px;
border:none;
border-radius:8px;
background:#222;
color:white;
cursor:pointer;
font-weight:bold;
z-index:999;
}

.dark-mode{
background:#121212;
color:white;
}

.dark-mode header{
background:#1b1b1b;
}

.dark-mode .container{
background:#222;
color:white;
}

.dark-mode h2,
.dark-mode h3{
color:#4da3ff;
}

.dark-mode label{
background:#2c2c2c;
border:1px solid #555;
color:white;
}

.dark-mode input[type="text"],
.dark-mode input[type="number"],
.dark-mode select,
.dark-mode #search{
background:#333;
color:white;
border:1px solid #555;
}

.dark-mode footer{
color:#ff8080;
}


    </style>  
    
</head>

<body>
    <button id="themeToggle" class="theme-btn">
🌙 Dark Mode
</button> 

<header>
    <h1>HealthAI</h1>
    <p>AI-Based Symptom Checker</p>
</header>

<div class="container">
    <h2>Select Your Symptoms</h2>

    <input
        type="text"
        id="search"
        placeholder="Search symptoms..."
        onkeyup="filterSymptoms()"
    >

    <form method="POST">

    <h2>Patient Information</h2>

    <label>Name</label>
    <input
        type="text"
        name="name"
        placeholder="Enter your name"
        required
        style="width:100%;padding:10px;margin-bottom:15px;"
    >

    <label>Age</label>
    <input
        type="number"
        name="age"
        min="1"
        max="120"
        placeholder="Enter your age"
        required
        style="width:100%;padding:10px;margin-bottom:15px;"
    >

    <label>Gender</label>
    <select
        name="gender"
        required
        style="width:100%;padding:10px;margin-bottom:25px;"
    >
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>

    <h2>Select Your Symptoms</h2> 

        <div class="symptoms" id="symptomList">
            {% for symptom in symptoms %}
            <label>
                <input type="checkbox" name="symptoms" value="{{ symptom }}">
                {{ symptom }}
            </label>
            {% endfor %}
        </div>
        <h3>⏳ Symptom Duration</h3>

<label><input type="radio" name="duration" value="less_24" required> Less than 24 hours</label><br>
<label><input type="radio" name="duration" value="1_3_days"> 1–3 days</label><br>
<label><input type="radio" name="duration" value="more_3_days"> More than 3 days</label><br>
<label><input type="radio" name="duration" value="more_week"> More than 1 week</label>

<hr>

<h3>👤 Patient Condition</h3>

<label><input type="checkbox" name="condition" value="child"> Child (Under 12)</label><br>
<label><input type="checkbox" name="condition" value="elderly"> Elderly (60+)</label><br>
<label><input type="checkbox" name="condition" value="pregnant"> Pregnant</label><br>
<label><input type="checkbox" name="condition" value="diabetes"> Diabetes</label><br>
<label><input type="checkbox" name="condition" value="bp"> High Blood Pressure</label><br>
<label><input type="checkbox" name="condition" value="asthma"> Asthma</label><br>
<label><input type="checkbox" name="condition" value="heart"> Heart Disease</label>

<hr>

<h3>📊 Symptom Severity</h3>

<label><input type="radio" name="severity" value="mild" required> Mild</label><br>
<label><input type="radio" name="severity" value="moderate"> Moderate</label><br>
<label><input type="radio" name="severity" value="severe"> Severe</label>

        <button type="submit">Analyze Symptoms</button>
    </form>

    <footer>
        ⚠ Educational use only. Not a medical diagnosis tool.
    </footer>
</div>

<script>
function filterSymptoms() {
    let input = document.getElementById("search").value.toLowerCase();
    let labels = document.querySelectorAll("#symptomList label");

    labels.forEach(label => {
        let text = label.textContent.toLowerCase();
        if (text.includes(input)) {
            label.style.display = "block";
        } else {
            label.style.display = "none";
        }
    });

    
}
</script>
<script>
const btn = document.getElementById("themeToggle");

// Load saved theme
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark-mode");
    btn.innerHTML = "☀️ Light Mode";
}

btn.addEventListener("click", function(){

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
        btn.innerHTML = "☀️ Light Mode";
        localStorage.setItem("theme","dark");
    }else{
        btn.innerHTML = "🌙 Dark Mode";
        localStorage.setItem("theme","light");
    }

});
</script>

</body>
</html>
```
